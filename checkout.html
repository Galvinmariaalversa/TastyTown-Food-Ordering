<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - TastyTown</title>
    <meta name="description" content="Securely place your order on Tasty Town. Enter your delivery address, select delivery speed, and choose your payment method.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://tastytown.netlify.app/checkout.html">
    <meta name="theme-color" content="#f97316">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Secure Checkout – TastyTown">
    <meta property="og:description" content="Securely place your order on Tasty Town. Enter your delivery details and choose your payment method.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1504674900247-0877df9cc836?fm=webp&fit=crop&w=1200&h=630&q=80">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f97316',
                        secondary: '#1f2937',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        heading: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <!-- CheckoutPage Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CheckoutPage",
      "name": "Secure Checkout - TastyTown",
      "description": "Enter your delivery address, select your options, and place your order.",
      "url": "https://tastytown.netlify.app/checkout.html"
    }
    </script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased">
    <h1 class="sr-only">Secure Checkout</h1>

    <!-- Navbar (Simplified) -->
    <nav class="sticky top-0 z-40 glass-nav border-b border-gray-150/40 py-3.5 shadow-sm">
        <div class="container mx-auto px-4 md:px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2.5 group">
                <div class="relative w-10 h-10 flex items-center justify-center group-hover:scale-105 transition-transform duration-300">
                    <div class="absolute inset-0 bg-primary/10 rounded-xl group-hover:bg-primary/15 transition-colors"></div>
                    <svg class="w-7 h-7 text-primary" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 21C16 16.5 19 13 19 9C19 5.13401 15.866 2 12 2C8.13401 2 5 5.13401 5 9C5 13 8 16.5 12 21Z" fill="url(#logo-grad)" stroke="#ea580c" stroke-width="1.2" stroke-linejoin="round" />
                        <path d="M8 12C8 9.79086 9.79086 8 12 8C14.2091 8 16 9.79086 16 12H8Z" fill="white" />
                        <path d="M7 13.5H17" stroke="white" stroke-width="1.2" stroke-linecap="round" />
                        <circle cx="12" cy="7" r="0.5" fill="white" />
                        <path d="M11 5.5C11.5 5 11.5 4.5 12 4.5" stroke="white" stroke-width="1" stroke-linecap="round" />
                        <path d="M13 5.5C13.5 5 13.5 4.5 14 4.5" stroke="white" stroke-width="1" stroke-linecap="round" />
                        <defs>
                            <linearGradient id="logo-grad" x1="5" y1="2" x2="19" y2="21" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#f97316" />
                                <stop offset="1" stop-color="#ea580c" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="flex flex-col leading-none">
                    <span class="font-heading font-extrabold text-xl text-gray-900 tracking-tight group-hover:text-primary transition-colors">Tasty<span class="text-primary">Town</span></span>
                    <span class="text-[9px] text-gray-400 font-bold tracking-widest uppercase mt-0.5">Premium Delivery</span>
                </div>
            </a>
            <div class="flex items-center gap-4">

                <!-- Progress Steps -->
                <div class="hidden md:flex items-center gap-2 text-sm font-semibold text-gray-400">
                    <a href="cart.html" class="hover:text-primary">1. Cart</a>
                    <i class="ri-arrow-right-s-line"></i>
                    <span class="text-primary font-bold">2. Checkout</span>
                    <i class="ri-arrow-right-s-line"></i>
                    <span>3. Track Order</span>
                </div>
                <div class="text-xs font-bold text-gray-400 bg-gray-50 border border-gray-150 px-3 py-1.5 rounded-lg flex items-center gap-1.5">
                    SECURE <i class="ri-lock-fill text-green-600"></i>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- Left: Forms -->
        <div class="lg:col-span-2 space-y-6">

            <!-- Delivery Details -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="font-heading text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                    <span
                        class="w-8 h-8 bg-gray-900 text-white rounded-full flex items-center justify-center text-sm">1</span>
                    Delivery Details
                </h2>

                <form id="checkout-form" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1" for="checkout-name">Full Name</label>
                            <input type="text" id="checkout-name" name="name" autocomplete="name"
                                class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-primary/20 placeholder-gray-500"
                                required placeholder="John Doe" minlength="3" pattern="[a-zA-Z\s]{3,}" title="Please enter a valid name (at least 3 characters, alphabetic)">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1" for="checkout-phone">Phone Number</label>
                            <input type="tel" id="checkout-phone" name="phone" autocomplete="tel" inputmode="tel"
                                class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-primary/20 placeholder-gray-500"
                                required placeholder="+1 234 567 890" pattern="[0-9+ \-()]{7,15}" title="Please enter a valid phone number (7 to 15 digits)">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1" for="checkout-address">Delivery Address</label>
                        <textarea id="checkout-address" name="address" autocomplete="street-address"
                            class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-primary/20 h-24 placeholder-gray-500"
                            required placeholder="Street, City, Zip Code" minlength="10" title="Please enter a detailed delivery address (minimum 10 characters)"></textarea>
                    </div>
                </form>
            </div>

            <!-- Delivery Time -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="font-heading text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                    <span
                        class="w-8 h-8 bg-gray-900 text-white rounded-full flex items-center justify-center text-sm">2</span>
                    Delivery Options
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="time" class="peer sr-only" checked>
                        <div
                            class="p-4 border border-gray-200 rounded-xl hover:bg-gray-50 peer-checked:border-primary peer-checked:bg-orange-50 transition-all flex items-center gap-3">
                            <i class="ri-rocket-line text-2xl text-primary"></i>
                            <div>
                                <p class="font-bold text-gray-900">Standard Delivery</p>
                                <p class="text-xs text-gray-500">20-30 mins</p>
                            </div>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="time" class="peer sr-only">
                        <div
                            class="p-4 border border-gray-200 rounded-xl hover:bg-gray-50 peer-checked:border-primary peer-checked:bg-orange-50 transition-all flex items-center gap-3">
                            <i class="ri-calendar-line text-2xl text-primary"></i>
                            <div>
                                <p class="font-bold text-gray-900">Schedule Order</p>
                                <p class="text-xs text-gray-500">Choose a time slot</p>
                            </div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Payment Method -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="font-heading text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                    <span
                        class="w-8 h-8 bg-gray-900 text-white rounded-full flex items-center justify-center text-sm">3</span>
                    Payment Method
                </h2>
                <div class="space-y-3">
                    <label class="cursor-pointer block">
                        <input type="radio" name="payment" class="peer sr-only">
                        <div
                            class="p-4 border border-gray-200 rounded-xl hover:bg-gray-50 peer-checked:border-primary peer-checked:bg-orange-50 transition-all flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <i class="ri-bank-card-line text-xl text-gray-600"></i>
                                <span class="font-medium text-gray-900">Credit / Debit Card</span>
                            </div>
                        </div>
                    </label>
                    <label class="cursor-pointer block">
                        <input type="radio" name="payment" class="peer sr-only">
                        <div
                            class="p-4 border border-gray-200 rounded-xl hover:bg-gray-50 peer-checked:border-primary peer-checked:bg-orange-50 transition-all flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <i class="ri-qr-code-line text-xl text-gray-600"></i>
                                <span class="font-medium text-gray-900">UPI / GPay / PhonePe</span>
                            </div>
                        </div>
                    </label>
                    <label class="cursor-pointer block">
                        <input type="radio" name="payment" class="peer sr-only" checked>
                        <div
                            class="p-4 border border-gray-200 rounded-xl hover:bg-gray-50 peer-checked:border-primary peer-checked:bg-orange-50 transition-all flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <i class="ri-hand-coin-line text-xl text-gray-600"></i>
                                <span class="font-medium text-gray-900">Cash on Delivery</span>
                            </div>
                        </div>
                    </label>
                </div>
            </div>

        </div>

        <!-- Right: Summary -->
        <div class="w-full">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-4">
                <h3 class="font-heading text-lg font-bold text-gray-900 mb-4">Order Summary</h3>

                <div id="order-items" class="space-y-3 mb-4 max-h-60 overflow-y-auto custom-scrollbar">
                    <!-- JS populate -->
                </div>

                <div class="border-t border-gray-200 pt-4 space-y-2 text-sm text-gray-600">
                    <div class="flex justify-between">
                        <span>Total Pay</span>
                        <span class="font-bold text-lg text-primary" id="final-total">₹0</span>
                    </div>
                </div>

                <button id="place-order-btn"
                    class="w-full bg-primary text-white py-4 rounded-xl font-bold shadow-lg shadow-orange-200 hover:bg-orange-600 transition-all mt-6 flex items-center justify-center gap-2">
                    Place Order <i class="ri-arrow-right-line"></i>
                </button>

                <div class="mt-6 flex justify-center gap-4 text-gray-400 text-2xl">
                    <i class="ri-secure-payment-line" title="Secure Payment"></i>
                    <i class="ri-shield-check-line" title="Safe & Hygienic"></i>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { formatCurrency, getCartTotal, showToast, setupMobileMenu } from './js/main.js';

        // Load pre-saved location from home page selection if available
        const savedLocation = localStorage.getItem('tasty_location');
        if (savedLocation && savedLocation !== 'Manhattan, NY') {
            document.getElementById('checkout-address').value = savedLocation;
        }

        const itemsContainer = document.getElementById('order-items');
        let orderTotal = 0;

        const renderOrderItems = () => {
            const cart = JSON.parse(localStorage.getItem('tasty_cart')) || [];

            if (cart.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            itemsContainer.innerHTML = cart.map((item, index) => {
                const addOnsPrice = item.addOns ? item.addOns.reduce((s, a) => s + a.price, 0) : 0;
                const itemTotal = (item.price + addOnsPrice) * item.quantity;
                return `
                    <div class="flex justify-between items-center py-2 border-b border-gray-100 last:border-b-0 gap-3">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-gray-800 truncate">${item.name}</p>
                            <p class="text-xs text-gray-400 truncate">
                                ${item.addOns && item.addOns.length ? '+' + item.addOns.map(a => a.name).join(', ') : 'No add-ons'}
                            </p>
                        </div>
                        <div class="flex items-center gap-2 bg-gray-50 px-2 py-1 rounded-lg">
                            <button class="dec-qty-btn text-gray-500 hover:text-primary text-xs font-bold px-1" data-index="${index}" aria-label="Decrease quantity">-</button>
                            <span class="text-xs font-bold text-gray-800 min-w-[12px] text-center">${item.quantity}</span>
                            <button class="inc-qty-btn text-gray-500 hover:text-primary text-xs font-bold px-1" data-index="${index}" aria-label="Increase quantity">+</button>
                        </div>
                        <span class="text-sm font-semibold text-gray-700 whitespace-nowrap">
                            ${formatCurrency(itemTotal)}
                        </span>
                    </div>
                `;
            }).join('');

            // Recalculate totals
            const subtotal = cart.reduce((sum, item) => {
                const addOnsPrice = item.addOns ? item.addOns.reduce((s, a) => s + a.price, 0) : 0;
                return sum + (item.price + addOnsPrice) * item.quantity;
            }, 0);

            const deliveryFee = 40;
            const tax = subtotal * 0.05;
            orderTotal = subtotal + tax + deliveryFee;
            document.getElementById('final-total').textContent = formatCurrency(orderTotal);
        };

        // Handle quantity adjuster clicks
        itemsContainer.addEventListener('click', (e) => {
            const decBtn = e.target.closest('.dec-qty-btn');
            const incBtn = e.target.closest('.inc-qty-btn');
            if (!decBtn && !incBtn) return;

            const cart = JSON.parse(localStorage.getItem('tasty_cart')) || [];
            const index = parseInt(decBtn ? decBtn.dataset.index : incBtn.dataset.index);

            if (decBtn) {
                if (cart[index].quantity > 1) {
                    cart[index].quantity -= 1;
                } else {
                    cart.splice(index, 1);
                }
            } else if (incBtn) {
                cart[index].quantity += 1;
            }

            localStorage.setItem('tasty_cart', JSON.stringify(cart));
            window.dispatchEvent(new Event('cartUpdated'));
            renderOrderItems();
        });

        // Place Order Validation & Action
        document.getElementById('place-order-btn').addEventListener('click', (e) => {
            e.preventDefault();
            const form = document.getElementById('checkout-form');
            if (form.checkValidity()) {
                const orderId = 'ORD' + Math.floor(Math.random() * 1000000);
                const cart = JSON.parse(localStorage.getItem('tasty_cart')) || [];

                // Store Order Info for Track Page
                localStorage.setItem('last_order', JSON.stringify({
                    id: orderId,
                    total: orderTotal,
                    items: cart,
                    date: new Date().toISOString()
                }));

                // Clear Cart
                localStorage.removeItem('tasty_cart');
                window.dispatchEvent(new Event('cartUpdated'));

                // Redirect
                window.location.href = `success.html?orderId=${orderId}`;
            } else {
                form.reportValidity();
                showToast('Please fill out all details correctly', 'error');
            }
        });

        // Initialize mobile menu trigger and order lists
        setupMobileMenu();
        renderOrderItems();
    </script>

    <!-- Performance & UX Enhancement Module -->
    <script type="module" src="./js/performance.js"></script>
</body>

</html>
