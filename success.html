<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed - TastyTown</title>
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f97316',
                        secondary: '#1f2937',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        heading: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased h-screen flex items-center justify-center">

    <div class="bg-white p-8 md:p-12 rounded-3xl shadow-xl text-center max-w-md w-full mx-4">

        <!-- Custom Animated Checkmark -->
        <div class="flex justify-center mb-6">
            <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                <path class="checkmark-check" fill="none" stroke-linecap="round" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
        </div>

        <h1 class="font-heading text-2xl font-bold text-gray-900 mb-2">Order Confirmed!</h1>
        <p class="text-gray-500 mb-6">Your order has been placed successfully.</p>

        <div class="bg-gray-50 rounded-xl p-4 mb-8">
            <p class="text-sm text-gray-500 mb-1">Order ID</p>
            <p class="text-xl font-bold text-gray-900" id="order-id">#ORD123456</p>
            <div class="border-t border-gray-200 my-3"></div>
            <p class="text-sm text-gray-500 mb-1">Estimated Delivery</p>
            <p class="text-lg font-bold text-primary">30 - 45 Mins</p>
        </div>

        <div class="space-y-3">
            <a href="track.html"
                class="block w-full bg-primary text-white py-3 rounded-xl font-bold shadow-lg hover:bg-orange-600 transition-colors">
                Track Order
            </a>
            <a href="index.html"
                class="block w-full border border-gray-200 text-gray-600 py-3 rounded-xl font-bold hover:bg-gray-50 transition-colors">
                Continue Shopping
            </a>
        </div>

        <div class="mt-8 flex justify-center gap-4">
            <button class="text-gray-400 hover:text-green-500 transition-colors"><i
                    class="ri-whatsapp-line text-2xl"></i></button>
            <button class="text-gray-400 hover:text-blue-500 transition-colors"><i
                    class="ri-twitter-x-line text-2xl"></i></button>
            <button class="text-gray-400 hover:text-red-500 transition-colors"><i
                    class="ri-download-2-line text-2xl"></i></button>
        </div>
    </div>

    <script type="module">
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');
        if (orderId) {
            document.getElementById('order-id').textContent = '#' + orderId;
        }

        // Fire Confetti!
        import('https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/+esm')
            .then(module => {
                const confetti = module.default;
                // Double burst for a premium celebration feel
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6, x: 0.3 }
                });
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6, x: 0.7 }
                });
            })
            .catch(err => console.error('Confetti module error:', err));
    </script>
</body>

</html>
